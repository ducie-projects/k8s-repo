apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    # Roles
    p, role:admin, applications, *, */*, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, accounts, *, *, allow
    
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, */*, allow
    p, role:developer, repositories, get, *, allow
    
    p, role:viewer, applications, get, */*, allow
    p, role:viewer, repositories, get, *, allow
    
    # User-to-role mappings
    # g, admin-user, role:admin
    # g, developer-user, role:developer
    # g, viewer-user, role:viewer
    
    # OIDC group mappings (uncomment when using OIDC)
    # g, oidc:admin-group, role:admin
    # g, oidc:dev-group, role:developer
