apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-template
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ducie-projects/k8s-repo
    targetRevision: HEAD
    path: manifests/
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
