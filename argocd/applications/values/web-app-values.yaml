# Web Application Values
app:
  name: web-app
  namespace: production
  
image:
  repository: myregistry/web-app
  tag: latest
  pullPolicy: IfNotPresent

replicas: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "128Mi"
    cpu: "500m"

env:
  - name: ENV
    value: production
  - name: LOG_LEVEL
    value: info
